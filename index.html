<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
</head>
<body>

<h2>Car Price Predictor</h2>

<input id="year" placeholder="Year"><br><br>
<input id="hp" placeholder="Engine HP"><br><br>
<input id="cyl" placeholder="Cylinders"><br><br>
<input id="hwy" placeholder="Highway MPG"><br><br>
<input id="city" placeholder="City MPG"><br><br>
<input id="pop" placeholder="Popularity"><br><br>

<button onclick="predict()">Predict Price</button>

<h3 id="result"></h3>

<script>
async function predict() {
    const data = {
        year: Number(document.getElementById("year").value),
        engine_hp: Number(document.getElementById("hp").value),
        engine_cylinders: Number(document.getElementById("cyl").value),
        highway_mpg: Number(document.getElementById("hwy").value),
        city_mpg: Number(document.getElementById("city").value),
        popularity: Number(document.getElementById("pop").value)
    };

    try {
        const response = await fetch("https://car-price-api-0erc.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerText =
            "Predicted Price: $" + result.predicted_price.toFixed(2);

    } catch (error) {
        document.getElementById("result").innerText =
            "Error: " + error;
    }
}
</script>

</body>
</html>
