<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <h1>🚗 Car Price Predictor</h1>
    <p class="subtitle">
        Predict car price based on performance and brand popularity
    </p>

    <div class="form">

        <div class="input-group">
            <label>Year of Manufacture</label>
            <input id="year" placeholder="e.g. 2015">
            <small>Newer cars usually cost more</small>
        </div>

        <div class="input-group">
            <label>Engine Horsepower (HP)</label>
            <input id="hp" placeholder="e.g. 150 - 300">
            <small>Higher HP = higher price</small>
        </div>

        <div class="input-group">
            <label>Number of Cylinders</label>
            <input id="cyl" placeholder="e.g. 4, 6, 8">
            <small>More cylinders → better performance</small>
        </div>

        <div class="input-group">
            <label>Highway MPG</label>
            <input id="hwy" placeholder="e.g. 25">
            <small>Fuel efficiency on highway</small>
        </div>

        <div class="input-group">
            <label>City MPG</label>
            <input id="city" placeholder="e.g. 18">
            <small>Fuel efficiency in city</small>
        </div>

        <div class="input-group">
            <label>Select Car Brand (Popularity)</label>

            <select id="pop">
                <option value="">Select a brand</option>
                <option value="3916">BMW (3916)</option>
                <option value="3105">Audi (3105)</option>
                <option value="2031">Toyota (2031)</option>
                <option value="1385">Chevrolet (1385)</option>
                <option value="5657">Ford (5657)</option>
                <option value="873">Volkswagen (873)</option>
                <option value="617">Chrysler (617)</option>
                <option value="819">Fiat (819)</option>
                <option value="640">Subaru (640)</option>
                <option value="200">Mazda (200)</option>
                <option value="2200">Honda (2200)</option>
                <option value="1013">Mercedes-Benz (1013)</option>
                <option value="86">Rolls-Royce (86)</option>
                <option value="500">Jeep (500)</option>
                <option value="1200">Hyundai (1200)</option>
                <option value="1300">Kia (1300)</option>
                <option value="400">Dodge (400)</option>
                <option value="300">Mini (300)</option>
                <option value="700">Nissan (700)</option>
                <option value="900">Lexus (900)</option>
            </select>

            <small>Select brand to auto-fill popularity score</small>
        </div>

        <button onclick="predict()">Predict Price</button>

        <div id="result"></div>

    </div>
</div>

<script>
async function predict() {
    const data = {
        year: Number(document.getElementById("year").value),
        engine_hp: Number(document.getElementById("hp").value),
        engine_cylinders: Number(document.getElementById("cyl").value),
        highway_mpg: Number(document.getElementById("hwy").value),
        city_mpg: Number(document.getElementById("city").value),
        popularity: Number(document.getElementById("pop").value)
    };

    document.getElementById("result").innerText = "Predicting...";

    try {
        const response = await fetch("https://car-price-api-0erc.onrender.com/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerText =
            "💰 Estimated Price: $" + result.predicted_price.toFixed(2);

    } catch (error) {
        document.getElementById("result").innerText =
            "❌ Error: Unable to fetch prediction";
    }
}
</script>

</body>
</html>
